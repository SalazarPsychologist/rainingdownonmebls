    <style>
        :root {
            --bg: #121212;
            --card: #1e1e1e;
            --text: #ffffff;
            /* Updated to match the glowing gold base */
            --accent: #ffd700; 
            --border: #333;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Varela Round', sans-serif;
            margin: 0;
            padding: 30px;
            text-align: center;
        }
        
        /* VIBRANT GLOWING GOLD WITH NEON STREAKS & SWIRLS */
        h1 {
            font-family: 'Fredoka One', cursive;
            background: linear-gradient(
                120deg, 
                #ffd700 0%, 
                #ffb700 20%, 
                #b76e79 40%, /* Rose Gold Streak */
                #ff66cc 50%, /* Pink Neon Streak */
                #b76e79 60%, /* Rose Gold Streak */
                #ffd700 80%, 
                #ffd700 100%
            );
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: swirlStreaks 4s linear infinite;
            filter: drop-shadow(0 0 2px rgba(255,215,0,0.6));
            /* Multi-layered neon glow text shadow */
            text-shadow: 
                0 0 5px rgba(255, 215, 0, 0.5),
                0 0 15px rgba(183, 110, 121, 0.6),
                0 0 30px rgba(255, 102, 204, 0.4);
        }

        /* TEXT ANIMATION FOR SWIRLS/STREAKS */
        @keyframes swirlStreaks {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        .artwork-image {
            width: 100%;
            max-width: 1000px;
            display: block;
            margin: 30px auto;
            border: 4px solid white;
            border-radius: 20px;
        }
        .audio-wrapper {
            width: 100%;
            max-width: 760px;
            margin: 30px auto;
            background: var(--card);
            border: 4px solid var(--accent);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 8px 8px 0px white;
        }
        .audio-wrapper iframe {
            width: 100%;
            border: none;
            display: block;
        }
        .back-btn {
            display: inline-block;
            margin-top: 30px;
            padding: 15px 30px;
            border: 2px solid white;
            border-radius: 25px;
            color: white;
            text-decoration: none;
            font-family: 'Fredoka One', cursive;
        }
        .back-btn:hover {
            background: rgba(255, 255, 255, .15);
        }
/* ===== LIKE SYSTEM ===== */

.like-section {
    position: relative;
    margin: 25px auto;
    display: inline-flex;
    align-items: center;
    gap: 12px;
    background: var(--card);
    padding: 10px 25px;
    border-radius: 30px;
    border: 2px solid #333;
}

.like-btn {
    background: none;
    border: none;
    font-size: 28px;
    cursor: pointer;
    transition: transform .2s cubic-bezier(.175,.885,.32,1.275);
    outline: none;
    padding: 0;
    user-select: none;
}

.like-btn:active {
    transform: scale(1.4);
}

.like-count {
    font-family: 'Fredoka One', cursive;
    font-size: 20px;
    color: white;
    min-width: 30px;
}

.floating-heart {
    position: absolute;
    bottom: 50%;
    left: 25px;
    font-size: 24px;
    pointer-events: none;
    user-select: none;
    animation: popAndFloat 2.8s ease-out forwards;
    opacity: 0;
}

@keyframes popAndFloat {

    0% {
        transform: translate(0,0) scale(.5);
        opacity:0;
    }

    15% {
        opacity:1;
        transform:
            translate(var(--x-burst),var(--y-burst))
            scale(1.3);
    }

    100% {
        transform:
            translate(var(--x-float),var(--y-float))
            scale(.8)
            rotate(var(--rot));
        opacity:0;
    }

}
    </style>

const params = new URLSearchParams(window.location.search);
const id = params.get('id');

if (artworkData[id]) {

document.title = artworkData[id].title;

document.getElementById("title").innerText =
artworkData[id].title;

document.getElementById("artImage").src =
artworkData[id].image;

document.getElementById("description").innerText =
artworkData[id].description;

document.getElementById("songFrame").src =
artworkData[id].song;

}

/* ===== FIREBASE LIKES ===== */

const heartBtn =
document.getElementById("heartBtn");

const likeCount =
document.getElementById("likeCount");

const likeRef =
ref(db, "likes/item_" + id);

let hasLiked =
localStorage.getItem("liked_item_" + id)
=== "true";

heartBtn.innerText =
hasLiked ? "❤️" : "🤍";

onValue(likeRef, (snapshot) => {

    const likes =
    snapshot.val() || 0;

    likeCount.innerText =
    likes;

});

heartBtn.addEventListener("click", () => {

    if (!hasLiked) {

        runTransaction(
            likeRef,
            current =>
            (current || 0) + 1
        );

        localStorage.setItem(
            "liked_item_" + id,
            "true" 
        );

        heartBtn.innerText =
        "🤍";

        hasLiked = true;

        createHeartExplosion();

    } else {

        runTransaction(
            likeRef,
            current =>
            Math.max(
                0,
                (current || 0) - 1
            )
        );

        localStorage.removeItem(
            "liked_item_" + id
        );

        heartBtn.innerText =
        "🖤";

        hasLiked = false;

    }

});

/* ===== FLOATING HEARTS ===== */

function createHeartExplosion() {

    const container =
    document.querySelector(
        ".like-section"
    );

    const heartCount = 50;

    for(let i=0;i<heartCount;i++) {

        const heart =
        document.createElement("div");

        heart.className =
        "floating-heart";

        heart.innerText =
        "❤️";

        const angle =
        (i / heartCount)
        * 2
        * Math.PI
        + (Math.random() * .4 - .2);

        const burstDistance =
        200 + Math.random() * 40;

        const xBurst =
        Math.cos(angle)
        * burstDistance;

        const yBurst =
        Math.sin(angle)
        * burstDistance
        + 10;

        const xFloat =
        xBurst
        + (Math.random()*100-50);

        const yFloat =
        yBurst
        + (Math.random() * 300 - 150);

        heart.style.setProperty(
            "--x-burst",
            `${xBurst}px`
        );

        heart.style.setProperty(
            "--y-burst",
            `${yBurst}px`
        );

        heart.style.setProperty(
            "--x-float",
            `${xFloat}px`
        );

        heart.style.setProperty(
            "--y-float",
            `${yFloat}px`
        );

        heart.style.setProperty(
            "--rot",
            `${Math.random()*90-45}deg`
        );

        container.appendChild(
            heart
        );

        setTimeout(
            () => heart.remove(),
            6800
        );

    }

}
