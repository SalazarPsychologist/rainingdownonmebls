<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Visual Sanctuary EMDR Scroll</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #030306;
  font-family: Arial, sans-serif;
}

.app {
  width: 100vw;
  height: 100vh;
  overflow-y: scroll;
  scroll-snap-type: y mandatory;
}

.slide {
  width: 100vw;
  height: 100vh;
  display: flex;
  overflow-x: scroll;
  overflow-y: hidden;
  scroll-snap-type: x mandatory;
  scroll-behavior: smooth;
  scroll-snap-align: start;
}

.slide::-webkit-scrollbar,
.app::-webkit-scrollbar { display: none; }

.panel {
  position: relative;
  min-width: 100vw;
  height: 100vh;
  overflow: hidden;
  scroll-snap-align: start;
  background: #000;
}

.panel img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

/* UI */

.hint, .motion-label {
  position: absolute;
  z-index: 60;
  color: white;
  background: rgba(0,0,0,0.45);
  padding: 8px 12px;
  border-radius: 999px;
  font-size: 12px;
}

.hint {
  right: 18px;
  top: 50%;
  transform: translateY(-50%);
}

.motion-label {
  top: 16px;
  right: 16px;
}

.back-btn, .nav-btn {
  position: absolute;
  z-index: 70;
  border: none;
  background: rgba(255,255,255,0.82);
  color: #111;
  padding: 9px 14px;
  border-radius: 999px;
  font-weight: bold;
  cursor: pointer;
}

.back-btn { top: 16px; left: 16px; }
.prev-btn { left: 14px; top: 50%; transform: translateY(-50%); }
.next-btn { right: 14px; top: 50%; transform: translateY(-50%); }

.overlay {
  position: absolute;
  inset: 0;
  z-index: 30;
  pointer-events: none;
}

.image-darkener {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.08);
  z-index: 5;
}

.controls {
  position: absolute;
  bottom: 14px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 90;
  background: rgba(0,0,0,0.64);
  color: white;
  padding: 10px;
  border-radius: 18px;
  display: flex;
  gap: 8px;
  align-items: center;
  font-size: 12px;
  max-width: 96vw;
  overflow-x: auto;
  backdrop-filter: blur(8px);
}

.controls input[type="color"] {
  width: 34px;
  height: 28px;
  border: none;
}

.controls input[type="range"] { width: 85px; }

select {
  border-radius: 999px;
  padding: 5px 8px;
  border: none;
}

.preset {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 2px solid white;
  cursor: pointer;
  flex: 0 0 auto;
}

/* MOTION 1: EMOJI BILATERAL */

.bilateral-emoji {
  position: absolute;
  top: 50%;
  font-size: clamp(2.5rem, 8vw, 5.5rem);
  filter: drop-shadow(0 0 18px var(--motionColor));
  animation: bilateralMove var(--motionSpeed) linear infinite alternate;
}

.bilateral-dot {
  position: absolute;
  top: 50%;
  width: 38px;
  height: 38px;
  border-radius: 50%;
  background: var(--motionColor);
  box-shadow: 0 0 35px var(--motionColor);
  animation: bilateralMove var(--motionSpeed) linear infinite alternate;
}

@keyframes bilateralMove {
  from { left: 6%; transform: translateY(-50%); }
  to { left: 86%; transform: translateY(-50%); }
}

/* STAR / SHAPE SWIRL */

.star-symbol {
  position: absolute;
  left: 50%;
  top: 50%;
  color: var(--motionColor);
  font-size: 28px;
  text-shadow: 0 0 18px var(--motionColor);
  animation: starSwirl var(--motionSpeed) linear infinite;
}

.star-symbol:nth-child(2) { animation-delay: .25s; }
.star-symbol:nth-child(3) { animation-delay: .5s; }
.star-symbol:nth-child(4) { animation-delay: .75s; }
.star-symbol:nth-child(5) { animation-delay: 1s; }
.star-symbol:nth-child(6) { animation-delay: 1.25s; }

@keyframes starSwirl {
  from { transform: rotate(0deg) translateX(35px) rotate(0deg); opacity: 1; }
  to { transform: rotate(360deg) translateX(190px) rotate(-360deg); opacity: .25; }
}

/* BREATHING GLOW */

.breath-glow {
  position: absolute;
  inset: 10%;
  border-radius: 45px;
  border: 4px solid var(--motionColor);
  box-shadow: 0 0 45px var(--motionColor);
  animation: breathe var(--motionSpeed) ease-in-out infinite;
}

@keyframes breathe {
  0%,100% { transform: scale(.94); opacity: .25; }
  50% { transform: scale(1.03); opacity: .75; }
}

/* LIGHT RAIN */

.light-rain span {
  position: absolute;
  top: -20%;
  width: 3px;
  height: 95px;
  background: linear-gradient(transparent, var(--motionColor), transparent);
  animation: rainFall var(--motionSpeed) linear infinite;
}

.light-rain span:nth-child(1){left:10%;animation-delay:0s;}
.light-rain span:nth-child(2){left:25%;animation-delay:.4s;}
.light-rain span:nth-child(3){left:40%;animation-delay:.8s;}
.light-rain span:nth-child(4){left:58%;animation-delay:1.2s;}
.light-rain span:nth-child(5){left:73%;animation-delay:1.6s;}
.light-rain span:nth-child(6){left:88%;animation-delay:2s;}

@keyframes rainFall {
  from { transform: translateY(-20vh); }
  to { transform: translateY(140vh); }
}

/* HYPNOTIC SWIRL */

.hypnotic-swirl {
  position: absolute;
  inset: -20%;
  background: repeating-conic-gradient(
    from 0deg,
    transparent 0deg,
    transparent 10deg,
    var(--motionColor) 12deg,
    transparent 18deg
  );
  opacity: .34;
  mix-blend-mode: screen;
  animation: hypnoticSpin var(--motionSpeed) linear infinite;
}

.hypnotic-center {
  position: absolute;
  left: 50%;
  top: 50%;
  width: 28vmin;
  height: 28vmin;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  border: 3px solid var(--motionColor);
  box-shadow: 0 0 35px var(--motionColor);
  animation: pulseCenter 4s ease-in-out infinite;
}

@keyframes hypnoticSpin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

@keyframes pulseCenter {
  0%,100% { opacity: .25; transform: translate(-50%, -50%) scale(.82); }
  50% { opacity: .85; transform: translate(-50%, -50%) scale(1.15); }
}

/* FLASHING VERTICAL BAR */

.vertical-bar {
  position: absolute;
  top: 0;
  bottom: 0;
  width: 7vw;
  min-width: 35px;
  background: linear-gradient(90deg, transparent, var(--motionColor), transparent);
  box-shadow: 0 0 40px var(--motionColor);
  animation: verticalBarMove var(--motionSpeed) linear infinite alternate;
}

@keyframes verticalBarMove {
  from { left: -8vw; }
  to { left: 101vw; }
}

/* EXTRA MOTIONS */

.orbit-ring {
  position: absolute;
  left: 50%;
  top: 50%;
  width: 55vmin;
  height: 55vmin;
  border-radius: 50%;
  border: 3px solid var(--motionColor);
  box-shadow: 0 0 30px var(--motionColor);
  animation: orbitPulse var(--motionSpeed) ease-in-out infinite;
}

@keyframes orbitPulse {
  0%,100% { transform: translate(-50%, -50%) scale(.75); opacity:.2; }
  50% { transform: translate(-50%, -50%) scale(1.15); opacity:.85; }
}

.wave-line {
  position: absolute;
  top: 50%;
  left: -20%;
  width: 140%;
  height: 8px;
  background: var(--motionColor);
  box-shadow: 0 0 28px var(--motionColor);
  animation: waveSlide var(--motionSpeed) ease-in-out infinite alternate;
}

@keyframes waveSlide {
  from { transform: translateY(-50%) rotate(-6deg); }
  to { transform: translateY(-50%) rotate(6deg); }
}

.spark-field span {
  position: absolute;
  font-size: 24px;
  color: var(--motionColor);
  text-shadow: 0 0 20px var(--motionColor);
  animation: sparkleFloat var(--motionSpeed) ease-in-out infinite alternate;
}

.spark-field span:nth-child(1){left:12%;top:20%;}
.spark-field span:nth-child(2){left:30%;top:70%;animation-delay:.4s;}
.spark-field span:nth-child(3){left:50%;top:35%;animation-delay:.8s;}
.spark-field span:nth-child(4){left:72%;top:62%;animation-delay:1.2s;}
.spark-field span:nth-child(5){left:88%;top:22%;animation-delay:1.6s;}

@keyframes sparkleFloat {
  from { transform: translateY(-20px) scale(.7); opacity:.25; }
  to { transform: translateY(20px) scale(1.4); opacity:1; }
}

</style>
</head>

<body>

<div class="app" id="app"></div>

<script>
const images = [
  "./image1.png",
  "./image2.png",
  "./image3.png",
  "./image4.png",
  "./image5.png",
  "./image6.png",
  "./image7.png",
  "./image8.png",
  "./image9.png",
  "./image10.png",
  "./image11.png",
  "./image12.png",
  "./image13.png",
  "./image14.png",
  "./image15.png",
  "./image16.png",
  "./image17.png",
  "./image18.png",
  "./image19.png",
  "./image20.png",
  "./image21.png",
  "./image22.png",
  "./image23.png",
  "./image24.png",
  "./image25.png",
  "./image26.png",
  "./image27.png"
];

const colors = [
  "#ffffff", "#ffd966", "#a8d8e8", "#ff9bd2",
  "#b7ffb0", "#c7b6ff", "#ffb366", "#66fff2"
];

const emojiOptions = [
  "✨","⭐","🌟","💫","🕯️","💎","🦋","🌙",
  "☀️","❤️","💙","🕊️","🌈","🔥","🌊"
];

const swirlOptions = [
  "✦","✧","✺","✹","✶","✷","❋","●","◆","◇",
  "✚","✨","⭐","💫","🦋","🌙","❤️","💎"
];

const motions = [
  { name: "Emoji Bilateral", type: "emoji", color: "#ffffff", speed: 2 },
  { name: "Bilateral Flash", type: "dot", color: "#ffffff", speed: 2 },
  { name: "Star / Shape Swirl", type: "star", color: "#ffd966", speed: 4 },
  { name: "Breathing Glow", type: "breath", color: "#b8f7ff", speed: 4 },
  { name: "Light Rain", type: "rain", color: "#ffffff", speed: 3 },
  { name: "Hypnotic Swirl", type: "hypnotic", color: "#a8d8e8", speed: 8 },
  { name: "Flashing Vertical Bar", type: "bar", color: "#ffffff", speed: 2 },
  { name: "Expanding Orbit Ring", type: "orbit", color: "#c7b6ff", speed: 4 },
  { name: "Bilateral Wave Line", type: "wave", color: "#a8d8e8", speed: 3 },
  { name: "Floating Spark Field", type: "spark", color: "#ffd966", speed: 3 }
];

function presetsHTML() {
  return colors.map(c =>
    `<div class="preset" style="background:${c}" data-color="${c}"></div>`
  ).join("");
}

function selectHTML(className, options) {
  return `
    <select class="${className}">
      ${options.map(e => `<option>${e}</option>`).join("")}
    </select>
  `;
}

function controlsHTML(motion) {
  const emojiControl = motion.type === "emoji"
    ? `Emoji ${selectHTML("emojiSelect", emojiOptions)}`
    : "";

  const swirlControl = motion.type === "star"
    ? `Shape ${selectHTML("swirlSelect", swirlOptions)}`
    : "";

  return `
    <div class="controls">
      ${emojiControl}
      ${swirlControl}
      Color <input type="color" class="colorPicker" value="${motion.color}">
      ${presetsHTML()}
      Speed <input type="range" class="speedPicker" min="1" max="20" value="${motion.speed}">
    </div>
  `;
}

function overlayHTML(type) {
  if (type === "emoji") return `<div class="bilateral-emoji">✨</div>`;
  if (type === "dot") return `<div class="bilateral-dot"></div>`;

  if (type === "star") return `
    <div class="star-symbol">✦</div>
    <div class="star-symbol">✧</div>
    <div class="star-symbol">✦</div>
    <div class="star-symbol">✧</div>
    <div class="star-symbol">✦</div>
    <div class="star-symbol">✧</div>
  `;

  if (type === "breath") return `<div class="breath-glow"></div>`;

  if (type === "rain") return `
    <div class="light-rain">
      <span></span><span></span><span></span>
      <span></span><span></span><span></span>
    </div>
  `;

  if (type === "hypnotic") return `
    <div class="hypnotic-swirl"></div>
    <div class="hypnotic-center"></div>
  `;

  if (type === "bar") return `<div class="vertical-bar"></div>`;
  if (type === "orbit") return `<div class="orbit-ring"></div>`;
  if (type === "wave") return `<div class="wave-line"></div>`;

  if (type === "spark") return `
    <div class="spark-field">
      <span>✦</span><span>✧</span><span>✺</span><span>✦</span><span>✧</span>
    </div>
  `;
}

function createSlide(src, imageNumber) {
  let html = `
    <section class="slide">
      <div class="panel">
        <img src="${src}" alt="Visual Sanctuary ${imageNumber}">
        <div class="hint">Swipe →</div>
        <button class="nav-btn next-btn">→</button>
      </div>
  `;

  motions.forEach((motion, index) => {
    html += `
      <div class="panel motion-panel" style="--motionColor:${motion.color}; --motionSpeed:${motion.speed}s;">
        <img src="${src}" alt="">
        <div class="image-darkener"></div>
        <button class="back-btn">← Still</button>
        <button class="nav-btn prev-btn">←</button>
        ${index < motions.length - 1 ? `<button class="nav-btn next-btn">→</button>` : ""}
        <div class="motion-label">${motion.name}</div>
        <div class="overlay">${overlayHTML(motion.type)}</div>
        ${controlsHTML(motion)}
      </div>
    `;
  });

  html += `</section>`;
  return html;
}

const app = document.getElementById("app");

images.forEach((src, index) => {
  app.insertAdjacentHTML("beforeend", createSlide(src, index + 1));
});

/* Navigation */

document.querySelectorAll(".slide").forEach(slide => {
  const panels = Array.from(slide.querySelectorAll(".panel"));

  slide.querySelectorAll(".next-btn").forEach(button => {
    button.addEventListener("click", () => {
      const index = panels.indexOf(button.closest(".panel"));
      const next = panels[index + 1];
      if (next) slide.scrollTo({ left: next.offsetLeft, behavior: "smooth" });
    });
  });

  slide.querySelectorAll(".prev-btn").forEach(button => {
    button.addEventListener("click", () => {
      const index = panels.indexOf(button.closest(".panel"));
      const prev = panels[index - 1];
      if (prev) slide.scrollTo({ left: prev.offsetLeft, behavior: "smooth" });
    });
  });

  slide.querySelectorAll(".back-btn").forEach(button => {
    button.addEventListener("click", () => {
      slide.scrollTo({ left: 0, behavior: "smooth" });
    });
  });
});

/* Controls */

document.querySelectorAll(".motion-panel").forEach(panel => {
  const colorPicker = panel.querySelector(".colorPicker");
  const speedPicker = panel.querySelector(".speedPicker");
  const emojiSelect = panel.querySelector(".emojiSelect");
  const swirlSelect = panel.querySelector(".swirlSelect");

  colorPicker.addEventListener("input", () => {
    panel.style.setProperty("--motionColor", colorPicker.value);
  });

  speedPicker.addEventListener("input", () => {
    panel.style.setProperty("--motionSpeed", speedPicker.value + "s");
  });

  panel.querySelectorAll(".preset").forEach(preset => {
    preset.addEventListener("click", () => {
      const color = preset.dataset.color;
      panel.style.setProperty("--motionColor", color);
      colorPicker.value = color;
    });
  });

  if (emojiSelect) {
    emojiSelect.addEventListener("change", () => {
      const emoji = panel.querySelector(".bilateral-emoji");
      if (emoji) emoji.textContent = emojiSelect.value;
    });
  }

  if (swirlSelect) {
    swirlSelect.addEventListener("change", () => {
      panel.querySelectorAll(".star-symbol").forEach(star => {
        star.textContent = swirlSelect.value;
      });
    });
  }
});
</script>

</body>
</html>
